<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuxMate++</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13151c;
  --bg3: #1a1d27;
  --bg4: #222636;
  --border: #2a2f42;
  --border2: #363d56;
  --text: #e8ecf5;
  --text2: #9aa3bb;
  --text3: #5c6480;
  --accent: #4fffb0;
  --accent2: #00d4ff;
  --accent3: #ff6b6b;
  --accent4: #ffd166;
  --purple: #a78bfa;
  --card-hover: #1e2235;
  --selected: #0d2d1f;
  --selected-border: #4fffb0;
  --tag-bg: #1e2235;
}
[data-theme="light"] {
  --bg: #f0f2f8;
  --bg2: #e8eaf2;
  --bg3: #dde0ee;
  --bg4: #d0d4e8;
  --border: #c0c5dc;
  --border2: #a8aec8;
  --text: #1a1d2e;
  --text2: #4a5068;
  --text3: #8890aa;
  --card-hover: #e0e3f0;
  --selected: #d0f5e4;
  --selected-border: #1aab6d;
  --tag-bg: #dde0ee;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
/* GRID BG */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:0.15;
  pointer-events:none;
  z-index:0;
}
/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:0 2rem;
  display:flex;
  align-items:center;
  gap:1.5rem;
  height:64px;
  backdrop-filter:blur(12px);
}
.logo{
  font-size:1.4rem;
  font-weight:800;
  letter-spacing:-0.03em;
  white-space:nowrap;
  flex-shrink:0;
}
.logo span{color:var(--accent)}
.logo sup{font-size:0.65rem;color:var(--accent2);font-weight:700;vertical-align:super}
.search-wrap{
  flex:1;
  max-width:480px;
  position:relative;
}
.search-wrap svg{
  position:absolute;
  left:12px;top:50%;transform:translateY(-50%);
  color:var(--text3);
  pointer-events:none;
}
#search{
  width:100%;
  padding:0.5rem 0.75rem 0.5rem 2.5rem;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:0.85rem;
  outline:none;
  transition:border-color 0.2s;
}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--text3)}
.header-right{display:flex;align-items:center;gap:0.75rem;margin-left:auto;flex-shrink:0}
.sel-count{
  font-family:'JetBrains Mono',monospace;
  font-size:0.78rem;
  color:var(--accent);
  background:var(--selected);
  border:1px solid var(--selected-border);
  padding:0.2rem 0.6rem;
  border-radius:5px;
  white-space:nowrap;
}
.btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  padding:0.45rem 0.9rem;
  border-radius:7px;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:0.82rem;
  cursor:pointer;
  border:1px solid transparent;
  transition:all 0.15s;
  white-space:nowrap;
}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#0a1a10;border-color:var(--accent)}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{background:transparent;border-color:var(--border2);color:var(--accent3)}
.btn-danger:hover{border-color:var(--accent3);background:rgba(255,107,107,0.08)}
.theme-toggle{
  width:36px;height:36px;
  border-radius:8px;
  background:var(--bg3);
  border:1px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);
  transition:all 0.15s;
  font-size:1rem;
}
.theme-toggle:hover{border-color:var(--accent2);color:var(--accent2)}
/* MAIN LAYOUT */
.layout{display:flex;min-height:calc(100vh - 64px);position:relative;z-index:1}
/* SIDEBAR */
aside{
  width:220px;
  flex-shrink:0;
  border-right:1px solid var(--border);
  padding:1.25rem 0;
  position:sticky;
  top:64px;
  height:calc(100vh - 64px);
  overflow-y:auto;
  background:var(--bg);
}
aside::-webkit-scrollbar{width:4px}
aside::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.distro-section{padding:0 0.75rem 1rem}
.distro-label{
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text3);
  padding:0 0.5rem;
  margin-bottom:0.5rem;
}
.distro-btn{
  display:flex;align-items:center;gap:0.5rem;
  width:100%;padding:0.45rem 0.5rem;
  border-radius:7px;
  border:none;background:none;
  color:var(--text2);
  cursor:pointer;
  font-family:'Syne',sans-serif;
  font-size:0.85rem;
  font-weight:500;
  transition:all 0.12s;
  text-align:left;
  margin-bottom:2px;
}
.distro-btn:hover{background:var(--bg3);color:var(--text)}
.distro-btn.active{background:var(--bg4);color:var(--accent);font-weight:700}
.distro-icon{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:0.75rem 0.75rem}
.cat-section{padding:0 0.75rem}
.cat-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:0.4rem 0.5rem;
  border-radius:6px;
  border:none;background:none;
  color:var(--text3);
  cursor:pointer;
  font-family:'JetBrains Mono',monospace;
  font-size:0.78rem;
  transition:all 0.12s;
  text-align:left;
  margin-bottom:2px;
}
.cat-btn:hover{background:var(--bg3);color:var(--text2)}
.cat-btn.active{color:var(--accent2)}
.cat-count{
  font-size:0.7rem;
  background:var(--bg4);
  padding:1px 6px;
  border-radius:10px;
  color:var(--text3);
}
/* MAIN CONTENT */
main{flex:1;padding:1.5rem 2rem;overflow-x:hidden}
.cat-header{
  display:flex;align-items:center;gap:0.75rem;
  margin-bottom:1.25rem;
  padding-bottom:0.75rem;
  border-bottom:1px solid var(--border);
}
.cat-title{font-size:1.1rem;font-weight:800}
.cat-total{
  font-family:'JetBrains Mono',monospace;
  font-size:0.75rem;
  color:var(--text3);
  background:var(--bg3);
  padding:2px 8px;
  border-radius:10px;
}
.app-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:0.75rem;
  margin-bottom:2.5rem;
}
.app-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:0.85rem 1rem;
  cursor:pointer;
  transition:all 0.15s;
  position:relative;
  display:flex;flex-direction:column;gap:0.4rem;
}
.app-card:hover{background:var(--card-hover);border-color:var(--border2)}
.app-card.selected{
  background:var(--selected);
  border-color:var(--selected-border);
}
.app-card.hidden{display:none}
.app-top{display:flex;align-items:flex-start;gap:0.6rem}
.app-icon{
  width:34px;height:34px;
  border-radius:7px;
  background:var(--bg4);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  flex-shrink:0;
}
.app-info{flex:1;min-width:0}
.app-name{
  font-size:0.9rem;
  font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.app-desc{
  font-size:0.75rem;
  color:var(--text2);
  line-height:1.4;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.app-footer{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-top:0.2rem}
.tag{
  font-family:'JetBrains Mono',monospace;
  font-size:0.67rem;
  background:var(--tag-bg);
  color:var(--text3);
  padding:1px 6px;
  border-radius:4px;
  border:1px solid var(--border);
}
.tag.apt{color:#f97316}
.tag.dnf{color:#3b82f6}
.tag.pacman{color:#22d3ee}
.tag.flatpak{color:#a78bfa}
.tag.snap{color:#fbbf24}
.tag.cargo{color:#ef4444}
.tag.pip{color:#4ade80}
.tag.npm{color:#fb923c}
.tag.zypper{color:#10b981}
.tag.xbps{color:#f59e0b}
.tag.apk{color:#6ee7b7}
.tag.emerge{color:#c084fc}
.tag.nix{color:#60a5fa}
.check-indicator{
  position:absolute;top:0.6rem;right:0.6rem;
  width:18px;height:18px;
  border-radius:50%;
  background:var(--accent);
  display:none;
  align-items:center;justify-content:center;
}
.app-card.selected .check-indicator{display:flex}
.check-indicator svg{width:10px;height:10px;color:#0a1a10}
/* METHOD PICKER */
.method-picker{
  display:none;
  gap:0.3rem;
  flex-wrap:wrap;
  margin-top:0.35rem;
  padding-top:0.35rem;
  border-top:1px solid var(--border);
}
.app-card.selected .method-picker{display:flex}
.method-opt{
  font-family:'JetBrains Mono',monospace;
  font-size:0.67rem;
  padding:2px 8px;
  border-radius:4px;
  border:1px solid var(--border);
  cursor:pointer;
  background:var(--bg3);
  color:var(--text3);
  transition:all 0.1s;
}
.method-opt:hover{border-color:var(--accent2);color:var(--accent2)}
.method-opt.chosen{border-color:var(--accent);color:var(--accent);background:var(--selected)}
/* BOTTOM BAR */
#bottom-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:200;
  background:var(--bg);
  border-top:1px solid var(--border);
  padding:0.85rem 2rem;
  display:none;
  align-items:center;
  gap:1rem;
  backdrop-filter:blur(12px);
}
#bottom-bar.visible{display:flex}
.script-modes{display:flex;gap:0.4rem}
.mode-btn{
  font-family:'JetBrains Mono',monospace;
  font-size:0.75rem;
  padding:0.35rem 0.7rem;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--bg3);
  color:var(--text3);
  cursor:pointer;
  transition:all 0.12s;
}
.mode-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(0,212,255,0.08)}
.bar-actions{display:flex;gap:0.5rem;margin-left:auto}
/* OUTPUT MODAL */
#modal-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.75);
  z-index:300;
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#modal-overlay.open{display:flex}
#modal{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:14px;
  width:min(860px,95vw);
  max-height:85vh;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.modal-header{
  padding:1rem 1.25rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0.75rem;
}
.modal-title{font-size:1rem;font-weight:700}
.modal-tabs{display:flex;gap:0.35rem;margin-left:auto}
.tab-btn{
  font-family:'JetBrains Mono',monospace;
  font-size:0.75rem;
  padding:0.3rem 0.65rem;
  border-radius:5px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text3);
  cursor:pointer;
  transition:all 0.1s;
}
.tab-btn.active{border-color:var(--accent);color:var(--accent);background:var(--selected)}
.modal-body{flex:1;overflow-y:auto;padding:1.25rem}
.modal-body::-webkit-scrollbar{width:6px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#script-output{
  font-family:'JetBrains Mono',monospace;
  font-size:0.8rem;
  line-height:1.7;
  color:var(--accent);
  background:var(--bg);
  padding:1rem;
  border-radius:8px;
  border:1px solid var(--border);
  white-space:pre;
  overflow-x:auto;
  min-height:200px;
}
#summary-output{display:none}
.summary-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.summary-table th{
  text-align:left;padding:0.5rem 0.75rem;
  border-bottom:1px solid var(--border2);
  color:var(--text3);
  font-weight:600;
  font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.summary-table td{
  padding:0.5rem 0.75rem;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
.summary-table tr:last-child td{border-bottom:none}
.modal-footer{
  padding:0.85rem 1.25rem;
  border-top:1px solid var(--border);
  display:flex;gap:0.5rem;align-items:center;
}
.copy-feedback{
  font-family:'JetBrains Mono',monospace;
  font-size:0.75rem;
  color:var(--accent);
  opacity:0;
  transition:opacity 0.3s;
}
.copy-feedback.show{opacity:1}
/* PROFILE MODAL */
#profile-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.75);
  z-index:300;
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#profile-overlay.open{display:flex}
#profile-modal{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:14px;
  width:min(500px,95vw);
  overflow:hidden;
}
.profile-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.5rem}
.profile-body{padding:1.25rem}
.profile-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem}
.profile-item{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.6rem 0.75rem;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:7px;
}
.profile-name{flex:1;font-size:0.85rem;font-weight:600}
.profile-meta{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text3)}
.profile-save-row{display:flex;gap:0.5rem}
#profile-name-input{
  flex:1;padding:0.45rem 0.75rem;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:7px;color:var(--text);
  font-family:'Syne',sans-serif;font-size:0.85rem;outline:none;
}
#profile-name-input:focus{border-color:var(--accent)}
.no-profiles{font-size:0.82rem;color:var(--text3);text-align:center;padding:1.5rem}
/* EMPTY STATE */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4rem 2rem;
  color:var(--text3);
  gap:0.5rem;
  font-size:0.9rem;
}
.empty-state svg{opacity:0.3;margin-bottom:0.5rem}
/* CATEGORY SECTION ANCHOR */
.cat-section-anchor{scroll-margin-top:80px}
/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.app-card{animation:fadeIn 0.2s ease both}
/* RESPONSIVE */
@media(max-width:768px){
  aside{display:none}
  main{padding:1rem}
  header{padding:0 1rem}
  .logo{font-size:1.1rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">Tux<span>Mate</span><sup>++</sup></div>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search apps, tags, descriptions..." autocomplete="off">
  </div>
  <div class="header-right">
    <span class="sel-count" id="sel-count" style="display:none">0 selected</span>
    <button class="btn btn-ghost" onclick="openProfile()">⊞ Profiles</button>
    <button class="btn btn-danger" id="clear-btn" onclick="clearAll()" style="display:none">✕ Clear</button>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  </div>
</header>

<div class="layout">
  <aside id="sidebar">
    <div class="distro-section">
      <div class="distro-label">Distro</div>
      <button class="distro-btn active" data-distro="ubuntu" onclick="setDistro(this,'ubuntu')">
        <span class="distro-icon" style="background:#e05829">🟠</span> Ubuntu/Debian
      </button>
      <button class="distro-btn" data-distro="fedora" onclick="setDistro(this,'fedora')">
        <span class="distro-icon" style="background:#294172">🔵</span> Fedora/RHEL
      </button>
      <button class="distro-btn" data-distro="arch" onclick="setDistro(this,'arch')">
        <span class="distro-icon" style="background:#1793d1">🔷</span> Arch Linux
      </button>
      <button class="distro-btn" data-distro="opensuse" onclick="setDistro(this,'opensuse')">
        <span class="distro-icon" style="background:#73ba25">🟢</span> openSUSE
      </button>
      <button class="distro-btn" data-distro="void" onclick="setDistro(this,'void')">
        <span class="distro-icon" style="background:#295340">🌿</span> Void Linux
      </button>
      <button class="distro-btn" data-distro="alpine" onclick="setDistro(this,'alpine')">
        <span class="distro-icon" style="background:#0d597f">❄️</span> Alpine Linux
      </button>
      <button class="distro-btn" data-distro="gentoo" onclick="setDistro(this,'gentoo')">
        <span class="distro-icon" style="background:#54487a">💜</span> Gentoo
      </button>
      <button class="distro-btn" data-distro="nixos" onclick="setDistro(this,'nixos')">
        <span class="distro-icon" style="background:#5277c3">❄</span> NixOS
      </button>
    </div>
    <div class="divider"></div>
    <div class="cat-section" id="cat-nav"></div>
  </aside>

  <main id="main-content"></main>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <div class="script-modes">
    <button class="mode-btn active" data-mode="oneliner" onclick="setMode(this,'oneliner')">one-liner</button>
    <button class="mode-btn" data-mode="script" onclick="setMode(this,'script')">full script</button>
    <button class="mode-btn" data-mode="nix" onclick="setMode(this,'nix')">nix expr</button>
  </div>
  <div class="bar-actions">
    <button class="btn btn-ghost" onclick="openModal()">📋 Generate Script</button>
    <button class="btn btn-primary" onclick="openModal();copyScript()">⚡ Copy & Go</button>
  </div>
</div>

<!-- OUTPUT MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Generated Script</span>
      <div class="modal-tabs">
        <button class="tab-btn active" onclick="switchTab('script',this)">Script</button>
        <button class="tab-btn" onclick="switchTab('summary',this)">Summary</button>
      </div>
      <button class="btn btn-ghost" style="margin-left:0.5rem;padding:0.3rem 0.6rem" onclick="closeModal(null)">✕</button>
    </div>
    <div class="modal-body">
      <pre id="script-output"></pre>
      <div id="summary-output"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="copyScript()">Copy Script</button>
      <button class="btn btn-ghost" onclick="downloadScript()">↓ Download .sh</button>
      <span class="copy-feedback" id="copy-feedback">Copied!</span>
      <button class="btn btn-ghost" style="margin-left:auto" onclick="closeModal(null)">Close</button>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profile-overlay" onclick="closeProfile(event)">
  <div id="profile-modal">
    <div class="profile-header">
      <span style="font-weight:700;font-size:1rem">⊞ App Profiles</span>
      <button class="btn btn-ghost" style="margin-left:auto;padding:0.3rem 0.6rem" onclick="closeProfile(null)">✕</button>
    </div>
    <div class="profile-body">
      <div class="profile-list" id="profile-list"></div>
      <div class="profile-save-row">
        <input type="text" id="profile-name-input" placeholder="Profile name (e.g. Dev Setup)">
        <button class="btn btn-primary" onclick="saveProfile()">Save Current</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// APP DATABASE
// ============================================================

let currentTab = 'script';

const CATEGORIES = [...new Set(APPS.map(a=>a.cat))];

// ============================================================
const DISTRO_PKG_MANAGERS = {
  ubuntu:  {cmd:'apt',  install:'sudo apt install -y',  update:'sudo apt update &&',  name:'apt'},
  fedora:  {cmd:'dnf',  install:'sudo dnf install -y',  update:'',                    name:'dnf'},

  alpine:  {cmd:'apk',  install:'sudo apk add',         update:'sudo apk update &&',  name:'apk'},
  gentoo:  {cmd:'emerge',install:'sudo emerge --ask=n', update:'',                    name:'emerge'},
  nixos:   {cmd:'nix',  install:'nix-env -iA nixpkgs.', update:'',                    name:'nix'},
};

// ============================================================
// INIT
// ============================================================
function init(){
  renderSidebar();
  renderContent();
}

function renderSidebar(){
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '<div class="distro-label">Categories</div>' +
    CATEGORIES.map(cat=>{
      const count = APPS.filter(a=>a.cat===cat).length;
      return `<button class="cat-btn" onclick="scrollToCategory('${cat}')" id="catbtn-${cat.replace(/\s+/g,'_')}">
        ${cat}<span class="cat-count">${count}</span>
      </button>`;
    }).join('');
}

function renderContent(){
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  const search = document.getElementById('search').value.toLowerCase().trim();
  let anyVisible = false;

  CATEGORIES.forEach(cat=>{
    const apps = APPS.filter(a=>{
      if(a.cat !== cat) return false;
      if(!search) return true;
      return a.name.toLowerCase().includes(search)||
             a.desc.toLowerCase().includes(search)||
             (a.tags||[]).some(t=>t.includes(search));
    });
    if(!apps.length) return;
    anyVisible = true;

    const section = document.createElement('section');
    section.className = 'cat-section-anchor';
    section.id = 'cat-'+cat.replace(/\s+/g,'_');
    section.innerHTML = `
      <div class="cat-header">
        <span class="cat-title">${cat}</span>
        <span class="cat-total">${apps.length} apps</span>
      </div>
      <div class="app-grid" id="grid-${cat.replace(/\s+/g,'_')}"></div>
    `;
    main.appendChild(section);

    const grid = section.querySelector('.app-grid');
    apps.forEach((app,i)=>{
      grid.appendChild(buildCard(app,i));
    });
  });

  if(!anyVisible){
    main.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <div>No apps found for "<strong>${document.getElementById('search').value}</strong>"</div>
    </div>`;
  }
}

function buildCard(app, i){
  const card = document.createElement('div');
  card.className = 'app-card' + (selectedApps[app.id]!==undefined?' selected':'');
  card.style.animationDelay = Math.min(i*0.02,0.3)+'s';
  card.onclick = ()=>toggleApp(app.id, card);

  const methods = getAvailableMethods(app);
  const chosen = selectedApps[app.id] || methods[0]?.key || 'native';

  const nativeTag = getNativePkg(app);

  card.innerHTML = `
    <div class="app-top">
      <div class="app-icon">${app.icon}</div>
      <div class="app-info">
        <div class="app-name">${app.name}</div>
        <div class="app-desc">${app.desc}</div>
      </div>
    </div>
    <div class="app-footer">
      ${nativeTag?`<span class="tag ${currentDistro}">${DISTRO_PKG_MANAGERS[currentDistro].name}</span>`:''}
      ${app.flatpak?`<span class="tag flatpak">flatpak</span>`:''}
      ${app.cargo?`<span class="tag cargo">cargo</span>`:''}
      ${app.pip?`<span class="tag pip">pip</span>`:''}
      ${app.npm?`<span class="tag npm">npm</span>`:''}
      ${(app.tags||[]).slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}
    </div>
    <div class="method-picker" id="picker-${app.id}">
      ${methods.map(m=>`<button class="method-opt${m.key===chosen?' chosen':''}" onclick="event.stopPropagation();selectMethod('${app.id}','${m.key}',this)">${m.label}</button>`).join('')}
    </div>
    <div class="check-indicator">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  `;
  return card;
}

function getAvailableMethods(app){
  const methods = [];
  const native = getNativePkg(app);
  if(native) methods.push({key:'native',label:DISTRO_PKG_MANAGERS[currentDistro].name});
  if(app.flatpak) methods.push({key:'flatpak',label:'flatpak'});
  if(app.cargo) methods.push({key:'cargo',label:'cargo'});
  if(app.pip) methods.push({key:'pip',label:'pip'});
  if(app.npm) methods.push({key:'npm',label:'npm'});
  if(!methods.length) methods.push({key:'unavailable',label:'unavailable'});
  return methods;
}

function getNativePkg(app){
  return app.pkg && app.pkg[currentDistro] ? app.pkg[currentDistro] : null;
}

function toggleApp(id, card){
  if(selectedApps[id]!==undefined){
    delete selectedApps[id];
    card.classList.remove('selected');
  } else {
    const app = APPS.find(a=>a.id===id);
    const methods = getAvailableMethods(app);
    if(methods[0]?.key==='unavailable'){
      card.style.opacity='0.4';
      setTimeout(()=>card.style.opacity='',600);
      return;
    }
    selectedApps[id] = methods[0].key;
    card.classList.add('selected');
  }
  updateUI();
}

function selectMethod(appId, key, btn){
  selectedApps[appId] = key;
  const picker = document.getElementById('picker-'+appId);
  if(picker) picker.querySelectorAll('.method-opt').forEach(b=>{
    b.classList.toggle('chosen', b===btn);
  });
}

function updateUI(){
  const count = Object.keys(selectedApps).length;
  const countEl = document.getElementById('sel-count');
  const bar = document.getElementById('bottom-bar');
  const clearBtn = document.getElementById('clear-btn');
  if(count>0){
    countEl.style.display='';
    countEl.textContent = count+' selected';
    bar.classList.add('visible');
    clearBtn.style.display='';
  } else {
    countEl.style.display='none';
    bar.classList.remove('visible');
    clearBtn.style.display='none';
  }
}

function clearAll(){
  selectedApps={};
  document.querySelectorAll('.app-card.selected').forEach(c=>c.classList.remove('selected'));
  updateUI();
}

function setDistro(btn, distro){
  currentDistro=distro;
  document.querySelectorAll('.distro-btn').forEach(b=>b.classList.toggle('active',b===btn));
  // Reset selected methods to new distro's native if available
  Object.keys(selectedApps).forEach(id=>{
    if(selectedApps[id]==='native'){
      const app=APPS.find(a=>a.id===id);
      if(!getNativePkg(app)){
        const methods=getAvailableMethods(app);
        selectedApps[id]=methods[0]?.key||'unavailable';
      }
    }
  });
  renderContent();
  renderSidebar();
}

function setMode(btn, mode){
  scriptMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b===btn));
}

function scrollToCategory(cat){
  const el=document.getElementById('cat-'+cat.replace(/\s+/g,'_'));
  if(el) el.scrollIntoView({behavior:'smooth'});
}

// ============================================================
// SCRIPT GENERATION
// ============================================================
function generateScript(){
  const dm = DISTRO_PKG_MANAGERS[currentDistro];
  const selected = Object.entries(selectedApps);

  // Group by method
  const nativePkgs = [];
  const flatpakPkgs = [];
  const cargoPkgs = [];
  const pipPkgs = [];
  const npmPkgs = [];

  selected.forEach(([id,method])=>{
    const app = APPS.find(a=>a.id===id);
    if(!app) return;
    if(method==='native'){
      const pkg = getNativePkg(app);
      if(pkg) nativePkgs.push(...pkg.split(' '));
    } else if(method==='flatpak' && app.flatpak){
      flatpakPkgs.push(app.flatpak);
    } else if(method==='cargo' && app.cargo){
      cargoPkgs.push(app.cargo);
    } else if(method==='pip' && app.pip){
      pipPkgs.push(app.pip);
    } else if(method==='npm' && app.npm){
      npmPkgs.push(app.npm);
    }
  });

  if(scriptMode==='oneliner'){
    const parts=[];
    if(nativePkgs.length){
      if(currentDistro==='nixos'){
        parts.push(`nix-env -iA ${nativePkgs.map(p=>'nixpkgs.'+p).join(' ')}`);
      } else {
        parts.push(`${dm.update} ${dm.install} ${nativePkgs.join(' ')}`);
      }
    }
    if(flatpakPkgs.length) parts.push(`flatpak install -y flathub ${flatpakPkgs.join(' ')}`);
    if(cargoPkgs.length) parts.push(`cargo install ${cargoPkgs.join(' ')}`);
    if(pipPkgs.length) parts.push(`pip install --user ${pipPkgs.join(' ')}`);
    if(npmPkgs.length) parts.push(`npm install -g ${npmPkgs.join(' ')}`);
    return parts.join(' && ') || '# No apps selected';
  }

  if(scriptMode==='nix'){
    const nixPkgs = selected.map(([id,method])=>{
      const app=APPS.find(a=>a.id===id);
      if(!app) return null;
      if(method==='native' && app.pkg?.nixos) return '  pkgs.'+app.pkg.nixos+' # '+app.name;
      if(method==='flatpak' && app.flatpak) return '  # '+app.name+' — install via: flatpak install flathub '+app.flatpak;
      return null;
    }).filter(Boolean);
    return `# NixOS configuration.nix — environment.systemPackages
# Generated by TuxMate++
{ pkgs, ... }:
{
  environment.systemPackages = with pkgs; [
${nixPkgs.join('\n')}
  ];
}`;
  }

  // FULL SCRIPT
  let s = `#!/usr/bin/env bash
# ============================================================
# TuxMate++ Generated Script
# Distro: ${currentDistro.toUpperCase()}  |  Date: ${new Date().toLocaleDateString()}
# Apps: ${selected.length}
# ============================================================
set -euo pipefail
BOLD="\\033[1m"; GREEN="\\033[32m"; CYAN="\\033[36m"; RESET="\\033[0m"
log(){ echo -e "$CYAN[TuxMate++]$RESET $1"; }
ok(){ echo -e "$GREEN✓$RESET $1"; }

`;
  if(nativePkgs.length){
    if(currentDistro==='nixos'){
      s+=`log "Installing native packages via nix-env..."\nnix-env -iA ${nativePkgs.map(p=>'nixpkgs.'+p).join(' \\\n  ')}\nok "Native packages installed"\n\n`;
    } else {
      const updateLine = dm.update ? dm.update.replace('&&','').trim()+'\n' : '';
      s+=`log "Installing native packages via ${dm.name}..."\n${updateLine}${dm.install} \\\n  ${nativePkgs.join(' \\\n  ')}\nok "Native packages installed"\n\n`;
    }
  }
  if(flatpakPkgs.length){
    s+=`log "Setting up Flatpak..."\nflatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo\nlog "Installing Flatpak apps..."\nflatpak install -y flathub \\\n  ${flatpakPkgs.join(' \\\n  ')}\nok "Flatpak apps installed"\n\n`;
  }
  if(cargoPkgs.length){
    s+=`log "Installing via cargo..."\ncargo install ${cargoPkgs.join(' ')}\nok "Cargo packages installed"\n\n`;
  }
  if(pipPkgs.length){
    s+=`log "Installing via pip..."\npip install --user ${pipPkgs.join(' ')}\nok "pip packages installed"\n\n`;
  }
  if(npmPkgs.length){
    s+=`log "Installing via npm..."\nnpm install -g ${npmPkgs.join(' ')}\nok "npm packages installed"\n\n`;
  }
  s+=`echo -e "$BOLD$GREEN\\n✓ TuxMate++ — All done! $RESET"\n`;
  return s;
}

function generateSummaryHTML(){
  const rows = Object.entries(selectedApps).map(([id,method])=>{
    const app = APPS.find(a=>a.id===id);
    if(!app) return '';
    const pkg = method==='native' ? (getNativePkg(app)||'N/A') :
                method==='flatpak' ? app.flatpak :
                method==='cargo' ? app.cargo :
                method==='pip' ? app.pip :
                method==='npm' ? app.npm : 'N/A';
    return `<tr>
      <td>${app.icon} ${app.name}</td>
      <td>${app.cat}</td>
      <td><span class="tag ${method}">${method}</span></td>
      <td style="font-family:monospace;font-size:0.78rem;color:var(--accent)">${pkg}</td>
    </tr>`;
  }).join('');
  return `<table class="summary-table">
    <thead><tr><th>App</th><th>Category</th><th>Method</th><th>Package</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ============================================================
// MODAL
// ============================================================
function openModal(){
  const script = generateScript();
  document.getElementById('script-output').textContent = script;
  document.getElementById('summary-output').innerHTML = generateSummaryHTML();
  document.getElementById('modal-title').textContent =
    `Generated Script — ${Object.keys(selectedApps).length} apps — ${currentDistro.toUpperCase()}`;
  document.getElementById('modal-overlay').classList.add('open');
  currentTab='script';
  document.getElementById('script-output').style.display='';
  document.getElementById('summary-output').style.display='none';
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

function switchTab(tab, btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b===btn));
  document.getElementById('script-output').style.display = tab==='script'?'':'none';
  document.getElementById('summary-output').style.display = tab==='summary'?'':'none';
}

function copyScript(){
  const script = generateScript();
  navigator.clipboard.writeText(script).then(()=>{
    const fb = document.getElementById('copy-feedback');
    fb.classList.add('show');
    setTimeout(()=>fb.classList.remove('show'),2000);
  });
}

function downloadScript(){
  const script = generateScript();
  const ext = scriptMode==='nix' ? '.nix' : '.sh';
  const blob = new Blob([script],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tuxmate++'+ext;
  a.click();
}

// ============================================================
// PROFILES
// ============================================================
function openProfile(){
  renderProfiles();
  document.getElementById('profile-overlay').classList.add('open');
}

function closeProfile(e){
  if(!e||e.target===document.getElementById('profile-overlay'))
    document.getElementById('profile-overlay').classList.remove('open');
}

function renderProfiles(){
  const list = document.getElementById('profile-list');
  if(!profiles.length){
    list.innerHTML='<div class="no-profiles">No saved profiles yet.</div>';
    return;
  }
  list.innerHTML = profiles.map((p,i)=>`
    <div class="profile-item">
      <span class="profile-name">${p.name}</span>
      <span class="profile-meta">${p.distro} · ${Object.keys(p.apps).length} apps</span>
      <button class="btn btn-ghost" style="padding:0.2rem 0.6rem;font-size:0.75rem" onclick="loadProfile(${i})">Load</button>
      <button class="btn btn-danger" style="padding:0.2rem 0.6rem;font-size:0.75rem" onclick="deleteProfile(${i})">✕</button>
    </div>
  `).join('');
}

function saveProfile(){
  const name = document.getElementById('profile-name-input').value.trim();
  if(!name) return;
  profiles.push({name, distro:currentDistro, apps:{...selectedApps}, date:new Date().toLocaleDateString()});
  localStorage.setItem('tuxmate_profiles', JSON.stringify(profiles));
  document.getElementById('profile-name-input').value='';
  renderProfiles();
}

function loadProfile(i){
  const p = profiles[i];
  if(!p) return;
  selectedApps = {...p.apps};
  document.querySelectorAll('.app-card').forEach(c=>c.classList.remove('selected'));
  Object.keys(selectedApps).forEach(id=>{
    const cards = document.querySelectorAll('.app-card');
    // re-render to reflect loaded profile
  });
  closeProfile(null);
  renderContent();
  // re-apply selected state
  Object.keys(selectedApps).forEach(id=>{
    const app=APPS.find(a=>a.id===id);
    if(!app) return;
    const cards=document.querySelectorAll('.app-card');
    cards.forEach(c=>{
      if(c.querySelector('.app-name')?.textContent===app.name)
        c.classList.add('selected');
    });
  });
  updateUI();
}

function deleteProfile(i){
  profiles.splice(i,1);
  localStorage.setItem('tuxmate_profiles', JSON.stringify(profiles));
  renderProfiles();
}

// ============================================================
// THEME
// ============================================================
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme', isDark?'light':'dark');
  document.querySelector('.theme-toggle').textContent=isDark?'🌙':'☀️';
}

// ============================================================
// SEARCH
// ============================================================
let searchTimeout;
document.getElementById('search').addEventListener('input',()=>{
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(renderContent, 120);
});

// ============================================================
// BOOT
// ============================================================
init();
</script>
